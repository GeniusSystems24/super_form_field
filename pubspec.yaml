name: super_form_field
description: >
  GeniusLink design-system form fields for Flutter with unified InputDecoration
  APIs, badge validation, responsive interactions, light/dark themes, and
  LTR/RTL support.

# package version
version: 1.3.0

# package homepage, repository, and issue tracker
homepage: https://geniussystems24.github.io/super_form_field
repository: https://github.com/GeniusSystems24/super_form_field
issue_tracker: https://github.com/GeniusSystems24/super_form_field/issues

topics:
  - flutter
  - widgets
  - forms
  - validation
  - accessibility

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  # Shared GeniusLink design-system foundation (theme, tokens, type, sizes).
  super_core: ">=2.1.0 <3.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo-mark.png
    - assets/logo-mark-white.png
  # Drop the brand .ttf files under assets/fonts/ to match the design system
  # exactly. Families used by the kit:
  #   Manrope (display) · Inter (body) · JetBrainsMono (mono) · NotoNaskhArabic
  #
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
  #   - family: JetBrainsMono
  #     fonts:
  #       - asset: assets/fonts/JetBrainsMono-Regular.ttf
  #   - family: Manrope
  #     fonts:
  #       - asset: assets/fonts/Manrope-Bold.ttf
  #         weight: 700
  #   - family: NotoNaskhArabic
  #     fonts:
  #       - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
