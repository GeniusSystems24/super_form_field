name: super_form_field_example
description: Runnable gallery for the Super Form Field Flutter package.
publish_to: "none"
version: 1.3.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  # Shared GeniusLink foundation used directly by the demo scaffold.
  super_core: ">=2.1.0 <3.0.0"
  super_form_field:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
